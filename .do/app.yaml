name: aimenu-pos
region: fra
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
features:
  - buildpack-stack=ubuntu-22
domains:
  - domain: pos.aimenu.ge
    type: PRIMARY
    zone: aimenu.ge
static_sites:
  - name: aimenu-pos
    git:
      branch: main
      repo_clone_url: https://github.com/giorgigordiashvili/aimenu-pos.git
    source_dir: /
    build_command: npm install && npm run build:web
    output_dir: dist
    catchall_document: index.html
    envs:
      - key: EXPO_PUBLIC_API_URL
        scope: BUILD_TIME
        value: https://admin.aimenu.ge
